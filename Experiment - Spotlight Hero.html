<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>گوسان — کاوش (آزمایش)</title>
<link rel="stylesheet" href="_ds/gosan-magazine-design-system-8ee353e0-cfff-43a4-9021-45877939d3eb/tokens/fonts.css" />
<link rel="stylesheet" href="_ds/gosan-magazine-design-system-8ee353e0-cfff-43a4-9021-45877939d3eb/tokens/colors.css" />
<link rel="stylesheet" href="_ds/gosan-magazine-design-system-8ee353e0-cfff-43a4-9021-45877939d3eb/tokens/typography.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #C99227; --gold-light: #E1C486; --ink: #0c1311; }
  html, body { background: #0c1311; }
  body { font-family: 'Vazirmatn', sans-serif; -webkit-font-smoothing: antialiased; }
  .display { font-family: 'Lateef', 'Vazirmatn', serif; }

  @keyframes heroReveal { 0% { opacity: 0; transform: translateY(28px); filter: blur(12px); } 100% { opacity: 1; transform: translateY(0); filter: blur(0); } }
  @keyframes heroFadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes heroZoom { 0% { transform: scale(1.12); } 100% { transform: scale(1); } }
  @keyframes navDrop { 0% { opacity: 0; transform: translateY(-14px); } 100% { opacity: 1; transform: translateY(0); } }
  .hero-anim { opacity: 0; animation-fill-mode: forwards; animation-timing-function: cubic-bezier(0.16,1,0.3,1); }
  .hero-reveal { animation-name: heroReveal; animation-duration: 1.1s; }
  .hero-fade { animation-name: heroFadeUp; animation-duration: 1s; }
  .hero-zoom { animation: heroZoom 2.6s cubic-bezier(0.16,1,0.3,1) forwards; }
  .nav-drop { opacity: 0; animation: navDrop 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; }
  @media (prefers-reduced-motion: reduce) { .hero-anim, .hero-zoom, .nav-drop { animation: none; opacity: 1; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useRef, useState, useEffect } = React;

const BASE_IMAGE = 'assets/cypress-landscape.png';   /* quiet ink-wash layer */
const REVEAL_IMAGE = 'assets/cypress-landscape.png'; /* full gold-lit layer */
const SPOTLIGHT_R = 280;

/* ---------- cursor spotlight that reveals the gold layer ---------- */
function RevealLayer({ cursorX, cursorY }) {
  const canvasRef = useRef(null);
  const [mask, setMask] = useState('');

  useEffect(() => {
    const resize = () => {
      const c = canvasRef.current;
      if (!c) return;
      c.width = window.innerWidth;
      c.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);
    return () => window.removeEventListener('resize', resize);
  }, []);

  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    const g = ctx.createRadialGradient(cursorX, cursorY, 0, cursorX, cursorY, SPOTLIGHT_R);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.4, 'rgba(255,255,255,1)');
    g.addColorStop(0.6, 'rgba(255,255,255,0.75)');
    g.addColorStop(0.75, 'rgba(255,255,255,0.4)');
    g.addColorStop(0.88, 'rgba(255,255,255,0.12)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cursorX, cursorY, SPOTLIGHT_R, 0, Math.PI * 2);
    ctx.fill();
    setMask(c.toDataURL());
  }, [cursorX, cursorY]);

  return (
    <React.Fragment>
      <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, pointerEvents: 'none', display: 'none' }}></canvas>
      <div
        className="hero-zoom"
        style={{
          position: 'absolute', inset: 0, zIndex: 30, pointerEvents: 'none',
          backgroundImage: `url("${REVEAL_IMAGE}")`,
          backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat',
          filter: 'saturate(1.2) contrast(1.05) brightness(1.04)',
          WebkitMaskImage: mask ? `url(${mask})` : 'none',
          maskImage: mask ? `url(${mask})` : 'none',
          WebkitMaskSize: '100% 100%', maskSize: '100% 100%',
          WebkitMaskRepeat: 'no-repeat', maskRepeat: 'no-repeat',
        }}
      ></div>
    </React.Fragment>
  );
}

/* ---------- toranj mark (from the Gosan motif) ---------- */
function Toranj({ size = 22, color = '#fff' }) {
  return (
    <svg width={size * 86 / 117} height={size} viewBox="0 0 86 117" fill="none" aria-hidden="true">
      <g stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
        <path d="M43 3 C41.3 6 41.3 8.6 43 11.2 C44.7 8.6 44.7 6 43 3 Z" />
        <path d="M43 11 C49 14 55 18 57 27 C58.4 31 55.5 33 57 37 C61 46 65 55 65 65 C65 77 56 88 43 103 C30 88 21 77 21 65 C21 55 25 46 29 37 C30.5 33 27.6 31 29 27 C31 18 37 14 43 11 Z" />
        <path d="M43 50 C39 58 39 66 43 74 C47 66 47 58 43 50 Z" />
      </g>
    </svg>
  );
}

function Nav() {
  const items = ['کاوش', 'جستار', 'گفتگو', 'بایگانی', 'یادمان'];
  return (
    <nav className="nav-drop" style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px' }}>
      {/* right (RTL start): wordmark */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
        <Toranj size={26} color="#fff" />
        <span className="display" style={{ color: '#fff', fontSize: '2rem', fontWeight: 700, lineHeight: 1 }}>گوسان</span>
      </div>
      {/* center pill */}
      <div className="nav-pill" style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', background: 'rgba(255,255,255,0.16)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)', border: '1px solid rgba(255,255,255,0.28)', borderRadius: '999px', padding: '8px', display: 'flex', alignItems: 'center', gap: '4px' }}>
        {items.map((it, i) => (
          <button key={it} style={{
            border: 'none', cursor: 'pointer', fontFamily: 'inherit',
            padding: '6px 16px', borderRadius: '999px', fontSize: '0.875rem', fontWeight: 500,
            background: i === 0 ? '#fff' : 'transparent',
            color: i === 0 ? '#0c1311' : 'rgba(255,255,255,0.82)',
            transition: 'background 0.2s, color 0.2s',
          }}
          onMouseEnter={(e) => { if (i !== 0) { e.currentTarget.style.background = 'rgba(255,255,255,0.2)'; e.currentTarget.style.color = '#fff'; } }}
          onMouseLeave={(e) => { if (i !== 0) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'rgba(255,255,255,0.82)'; } }}
          >{it}</button>
        ))}
      </div>
      {/* left (RTL end): subscribe */}
      <button className="nav-cta" style={{
        background: '#fff', color: '#0c1311', border: 'none', cursor: 'pointer', fontFamily: 'inherit',
        fontSize: '0.875rem', fontWeight: 700, padding: '10px 24px', borderRadius: '999px',
        transition: 'background 0.2s',
      }}
      onMouseEnter={(e) => e.currentTarget.style.background = '#E1C486'}
      onMouseLeave={(e) => e.currentTarget.style.background = '#fff'}
      >عضویت</button>
    </nav>
  );
}

function Hero() {
  const mouse = useRef({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
  const smooth = useRef({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
  const rafRef = useRef(0);
  const [cursorPos, setCursorPos] = useState({ x: window.innerWidth / 2, y: window.innerHeight * 0.4 });

  useEffect(() => {
    const onMove = (e) => { mouse.current = { x: e.clientX, y: e.clientY }; };
    window.addEventListener('mousemove', onMove);
    const loop = () => {
      smooth.current.x += (mouse.current.x - smooth.current.x) * 0.1;
      smooth.current.y += (mouse.current.y - smooth.current.y) * 0.1;
      setCursorPos({ x: smooth.current.x, y: smooth.current.y });
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(rafRef.current); };
  }, []);

  return (
    <section style={{ position: 'relative', width: '100%', overflow: 'hidden', height: '100dvh', background: '#0c1311', cursor: 'crosshair' }}>
      {/* base ink-wash layer */}
      <div className="hero-zoom" style={{
        position: 'absolute', inset: 0, zIndex: 10,
        backgroundImage: `url("${BASE_IMAGE}")`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat',
        filter: 'grayscale(1) brightness(0.4) contrast(1.1)',
      }}></div>

      {/* gold reveal layer */}
      <RevealLayer cursorX={cursorPos.x} cursorY={cursorPos.y} />

      {/* legibility veil */}
      <div style={{ position: 'absolute', inset: 0, zIndex: 40, pointerEvents: 'none', background: 'linear-gradient(to bottom, rgba(12,19,17,0.55) 0%, rgba(12,19,17,0.1) 30%, rgba(12,19,17,0.15) 60%, rgba(12,19,17,0.72) 100%)' }}></div>

      {/* heading */}
      <div style={{ position: 'absolute', top: '15%', left: 0, right: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', padding: '0 20px', pointerEvents: 'none', zIndex: 50 }}>
        <h1 style={{ color: '#fff', lineHeight: 1.05, margin: 0 }}>
          <span className="display hero-anim hero-reveal" style={{ display: 'block', fontWeight: 500, fontSize: 'clamp(3rem, 9vw, 7rem)', color: '#E1C486', animationDelay: '0.25s' }}>لایه‌ها،</span>
          <span className="hero-anim hero-reveal" style={{ display: 'block', fontWeight: 700, fontSize: 'clamp(2.6rem, 7.5vw, 5.6rem)', letterSpacing: '-0.02em', marginTop: '0.2rem', animationDelay: '0.42s' }}>روایتگرِ زمان‌اند</span>
        </h1>
      </div>

      {/* bottom-right (RTL start) paragraph */}
      <div className="hero-anim hero-fade bl-para" style={{ position: 'absolute', bottom: '56px', right: '56px', maxWidth: '280px', textAlign: 'right', zIndex: 50, animationDelay: '0.7s' }}>
        <p style={{ fontSize: '0.9rem', color: 'rgba(255,255,255,0.82)', lineHeight: 2, margin: 0 }}>
          هر لایه از این خاک، فصلی از یادِ این سرزمین را در خود دارد؛ از سنگ‌نگاره‌های کهن تا نقش‌های فراموش‌شده، نهفته در ژرفای هزاران سال.
        </p>
      </div>

      {/* bottom-left (RTL end) block + CTA */}
      <div className="hero-anim hero-fade br-block" style={{ position: 'absolute', bottom: '40px', left: '56px', maxWidth: '300px', display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: '20px', zIndex: 50, animationDelay: '0.85s' }}>
        <p style={{ fontSize: '0.9rem', color: 'rgba(255,255,255,0.82)', lineHeight: 2, margin: 0, textAlign: 'right' }}>
          با گوسان، نور را بر خاکِ زمان بگردانید تا ببینید سنگ، نقش و خاطره چگونه زمینِ امروز را ساخته‌اند.
        </p>
        <button style={{
          background: '#C99227', color: '#0c1311', border: 'none', cursor: 'pointer', fontFamily: 'inherit',
          fontSize: '0.9rem', fontWeight: 700, padding: '12px 30px', borderRadius: '999px',
          transition: 'transform 0.2s, background 0.2s, box-shadow 0.2s',
        }}
        onMouseEnter={(e) => { e.currentTarget.style.background = '#E1C486'; e.currentTarget.style.transform = 'scale(1.04)'; e.currentTarget.style.boxShadow = '0 10px 30px -8px rgba(201,146,39,0.5)'; }}
        onMouseLeave={(e) => { e.currentTarget.style.background = '#C99227'; e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = 'none'; }}
        onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.96)'}
        onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1.04)'}
        >آغاز کاوش</button>
      </div>

      {/* hint */}
      <div style={{ position: 'absolute', bottom: '20px', left: 0, right: 0, textAlign: 'center', zIndex: 50, pointerEvents: 'none' }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: '0.62rem', letterSpacing: '0.18em', color: 'rgba(255,255,255,0.4)' }}>MOVE TO ILLUMINATE · نور را بگردانید</span>
      </div>
    </section>
  );
}

function App() {
  return (
    <div style={{ minHeight: '100vh', background: '#0c1311' }}>
      <Nav />
      <Hero />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
